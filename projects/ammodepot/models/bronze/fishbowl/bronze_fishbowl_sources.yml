version: 2

sources:
  - name: fishbowl
    description: >
      Fishbowl inventory management raw data.
      Source unique/not_null tests use severity: warn because Airbyte CDC
      naturally produces duplicate and null IDs for updated/deleted rows.
      Deduplication is handled in the Silver layer.
    schema: fishbowl
    config:
      freshness:
        warn_after: {count: 24, period: hour}
        error_after: {count: 48, period: hour}
      loaded_at_field: "_airbyte_extracted_at"
    tables:
      - name: customer
        description: Fishbowl Customer data
        columns:
          - name: id
            description: Primary key for Customer
            tests:
              - unique:
                  config:
                    severity: warn
              - not_null:
                  config:
                    severity: warn

      - name: part
        description: Fishbowl Part data
        columns:
          - name: id
            description: Primary key for Part
            tests:
              - unique:
                  config:
                    severity: warn
              - not_null:
                  config:
                    severity: warn

      - name: soitem
        description: Fishbowl Sales Order Item data
        columns:
          - name: id
            description: Primary key for Sales Order Item
            tests:
              - unique:
                  config:
                    severity: warn
              - not_null:
                  config:
                    severity: warn

      - name: so
        description: Fishbowl Sales Order data
        columns:
          - name: id
            description: Primary key for Sales Order
            tests:
              - unique:
                  config:
                    severity: warn
              - not_null:
                  config:
                    severity: warn

      - name: product
        description: Fishbowl Product data
        columns:
          - name: id
            description: Primary key for Product
            tests:
              - unique:
                  config:
                    severity: warn
              - not_null:
