models:
  - name: d_vendor
    description: "Vendor dimension containing supplier details, payment terms, and shipping defaults."
    columns:
      - name: VENDOR_ID
        description: "Primary key for the vendor."
        tests:
          - unique
          - not_null
      - name: VENDOR_NAME
        description: "Name of the vendor."
      - name: VENDOR_NOTE
        description: "Notes associated with the vendor."
      - name: VENDOR_URL
        description: "Vendor website URL."
      - name: LEAD_TIME_DAYS
        description: "Default lead time in days for vendor shipments."
      - name: STATUS_ID
        description: "Vendor status identifier."
      - name: ACCOUNT_ID
        description: "Associated account identifier."
      - name: SYSUSER_ID
        description: "System user identifier linked to the vendor."
      - name: TAX_RATE_ID
        description: "Tax rate identifier applied to the vendor."
      - name: ACCOUNT_NUMBER
        description: "Vendor account number."
      - name: IS_ACTIVE
        description: "Whether the vendor is active."
      - name: CURRENCY_ID
        description: "Currency identifier for the vendor."
      - name: CREDIT_LIMIT
        description: "Credit limit for the vendor."
      - name: DATE_ENTERED
        description: "Date when the vendor was entered into the system."
      - name: ACCOUNTING_ID
        description: "Accounting system identifier for the vendor."
      - name: CURRENCY_RATE
        description: "Currency exchange rate for the vendor."
      - name: CUSTOM_FIELDS
        description: "Custom fields associated with the vendor."
      - name: ACCOUNTING_HASH
        description: "Hash value for accounting synchronization."
      - name: MINIMUM_ORDER_AMOUNT
        description: "Minimum order amount required by the vendor."
      - name: LAST_CHANGED_USER
        description: "User who last modified the vendor record."
      - name: DATE_LAST_MODIFIED
        description: "Date when the vendor record was last modified."
      - name: DEFAULT_CARRIER_ID
        description: "Default shipping carrier identifier."
      - name: DEFAULT_SHIP_TERMS_ID
        description: "Default shipping terms identifier."
      - name: DEFAULT_PAYMENT_TERMS_ID
        description: "Default payment terms identifier."
      - name: DEFAULT_CARRIER_SERVICE_ID
        description: "Default carrier service identifier."
