version: 2

models:
  - name: d_product
    description: "Product dimension combining Magento catalog attributes with vendor cost and categorization data."
    columns:
      - name: "Product ID"
        description: "Primary key for the product."
        tests:
          - unique
          - not_null
      - name: "SKU"
        description: "Stock keeping unit identifier."
        tests:
          - not_null
      - name: "Product Name"
        description: "Display name of the product."
      - name: "General Purpose"
        description: "General purpose classification of the product."
      - name: "Product URL"
        description: "URL path to the product page."
      - name: "Product Image URL"
        description: "URL path to the product image."
      - name: "Vendor"
        description: "Vendor or supplier name."
      - name: "Discontinued"
        description: "Whether the product has been discontinued."
      - name: "Parent SKU"
        description: "SKU of the parent product, if applicable."
      - name: "GROUPED_SKU"
        description: "SKU for the grouped product association."
      - name: "Boxes/Case"
        description: "Number of boxes per case."
      - name: "Caliber"
        description: "Caliber of the ammunition or firearm."
      - name: "Manufacturer SKU"
        description: "SKU assigned by the manufacturer."
      - name: "UPC"
        description: "Universal Product Code."
      - name: "Manufacturer"
        description: "Name of the manufacturer."
      - name: "Projectile"
        description: "Type of projectile for ammunition products."
      - name: "Unit Type"
        description: "Unit type classification."
      - name: "Rounds/Package"
        description: "Number of rounds per package."
      - name: "Attribute Set"
        description: "Magento attribute set name."
      - name: "Categories"
        description: "Product categories."
      - name: "Gun Type"
        description: "Type of gun, if applicable."
      - name: "DD Caliber"
        description: "Detailed data caliber classification."
      - name: "DD Gun Action"
        description: "Detailed data gun action type."
      - name: "DD Condition"
        description: "Detailed data product condition."
      - name: "DD Gun Parts"
        description: "Detailed data gun parts classification."
      - name: "Capacity"
        description: "Product capacity (e.g., magazine capacity)."
      - name: "Material"
        description: "Product material composition."
      - name: "Primary Category"
        description: "Primary product category."
      - name: "DD Color"
        description: "Detailed data color classification."
      - name: "Optic Coating"
        description: "Optic coating type for optics products."
      - name: "DD Weapons Platform"
        description: "Detailed data weapons platform classification."
      - name: "Thread Pattern"
        description: "Thread pattern specification."
      - name: "Thread Type"
        description: "Thread type specification."
      - name: "Model"
        description: "Product model name or number."
      - name: "CONVERT"
        description: "Conversion factor for unit calculations."
      - name: "AVGCOST"
        description: "Average cost of the product."
      - name: "LASTVENDORCOST"
        description: "Last vendor cost for the product."
      - name: "DD Suggested Use"
        description: "Detailed data suggested use classification."
      - name: "use_type_category"
        description: "Use type category derived from product attributes."
