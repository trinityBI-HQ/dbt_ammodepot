
models:
  - name: d_customer_segmentation
    description: "Customer RFM segmentation view, calculating frequency, recency, monetary value, margin, overall classification, and hard-coded customer group."
    columns:
      - name: RANK_ID
        description: "Sequential identifier assigned to each unique customer."
        tests:
          - unique
          - not_null
      - name: CUSTOMER_EMAIL
        description: "Normalized email address of the customer."
        tests:
          - not_null
      - name: NUMBER_OF_PURCHASES
        description: "Count of distinct purchases by the customer in the last 12 months (up to end of prior month)."
      - name: TOTAL_REVENUE
        description: "Sum of row_total (gross revenue) for the customer in the last 12 months."
      - name: MARGIN
        description: "Profit margin for the period, calculated as (total_revenue - total cost) / total_revenue."
      - name: DAYS_SINCE_LAST_PURCHASE
        description: "Number of days between the most recent purchase and the end of the prior month."
      - name: TOTAL_PURCHASES_ALL_TIME
        description: "Count of distinct purchases by the customer across all time."
      - name: FREQUENCY
        description: "Frequency bucket label (F0-F5) based on number_of_purchases."
        tests:
          - accepted_values:
              arguments:
                values: ['F0', 'F1', 'F2', 'F3', 'F4', 'F5']
      - name: FREQUENCY_INT
        description: "Numeric representation of frequency bucket (0-5)."
        tests:
          - accepted_values:
              arguments:
                values: [0, 1, 2, 3, 4, 5]
      - name: RECENCY
        description: "Recency bucket label (R0-R5) based on days_since_last_purchase."
        tests:
          - accepted_values:
              arguments:
                values: ['R0', 'R1', 'R2', 'R3', 'R4', 'R5']
      - name: RECENCY_INT
        description: "Numeric representation of recency bucket (0-5)."
        tests:
          - accepted_values:
              arguments:
                values: [0, 1, 2, 3, 4, 5]
      - name: VALUE
        description: "Monetary bucket label (V0-V5) based on total_revenue."
        tests:
          - accepted_values:
              arguments:
                values: ['V0', 'V1', 'V2', 'V3', 'V4', 'V5']
      - name: VALUE_INT
        description: "Numeric representation of monetary bucket (0-5)."
      - name: MARGIN_CLASSIFICATION
        description: "Margin bucket label (M0-M5) based on margin percentage."
        tests:
          - accepted_values:
              arguments:
                values: ['M0', 'M1', 'M2', 'M3', 'M4', 'M5']
      - name: MARGIN_INT
        description: "Numeric representation of margin bucket (0-5)."
      - name: MONETARY_VALUE
        description: "Combined monetary value bucket (MV0-MV5), the floor of the average of margin_int and value_int."
        tests:
          - accepted_values:
              arguments:
                values: ['MV0', 'MV1', 'MV2', 'MV3', 'MV4', 'MV5']
      - name: CUSTOMER_CLASSIFICATION
        description: "Overall customer segment determined by frequency and recency combination."
        tests:
          - accepted_values:
              arguments:
                values:
                  - 'Super Engaged'
                  - 'Highly Engaged'
                  - 'Active Loyalist'
                  - 'Engaged Regular'
                  - 'Regular w/Potential'
                  - 'At-Risk Regular'
                  - 'Moderate Engager'
                  - 'Relatively New Buyer'
                  - 'New Buyer'
                  - 'New Active Buyer'
                  - 'Lapsed Buyer'
                  - 'Inactive'
                  - 'Lost Buyer'
                  - 'Losing 1-Time Buyer'
                  - 'Nurture Potential'
                  - 'Inactive Regular'
                  - 'Unclassified'
      - name: CUSTOMER_GROUP
        description: "Customer group label from Magento (Law Enforcement, Wholesale, General, NOT LOGGED IN, Retailer, Not Registered)."
        tests:
          - accepted_values:
              arguments:
                values:
                  - 'Law Enforcement'
                  - 'Wholesale'
                  - 'General'
                  - 'NOT LOGGED IN'
                  - 'Retailer'
                  - 'Not Registered'
