  ammodepot_defense_calibers: "'9mm','.45 ACP','.380 Auto','.38 Special','.40 S&W','.357 Mag','45 ACP','380 ACP','38 Special','40 S&W','357 Mag','10mm','44 Mag'"
  ammodepot_defense_fallback_calibers: "'9mm','45 ACP','380 ACP','38 Special','40 S&W','357 Mag','10mm','44 Mag','45 LC'"
  ammodepot_tactical_calibers: "'5.56 NATO','223/5.56','300 Blackout'"
  ammodepot_tactical_projectiles: "'HP','OTM','BTHP'"
  ammodepot_tactical_fallback_calibers: "'223/5.56','300 Blackout','308 Win Match','338 Lapua'"
  ammodepot_sporting_projectiles: "'FMJ','TMJ','FMJBT','LRN','LFN'"
  ammodepot_sporting_shot_types: "'7.5 Shot','8 Shot','9 Shot','Clay & Target','Game & Target'"
  ammodepot_sporting_fallback_calibers: "'22 LR','22 Mag/WMR','17 HMR','22-250','6mm Creedmoor'"
  ammodepot_shotgun_gauges: "'12 Gauge','20 Gauge','410 Bore','28 Gauge'"
  ammodepot_shotgun_sporting_shot: "'7.5 Shot','8 Shot','9 Shot','7 Shot','6 Shot','5 Shot','4 Shot'"
  ammodepot_shotgun_defense_slug: "'00 Buck','Slug','OO Buck','000 Buck','4 Buck','Buckshot','1 Buck','2 Buck','3 Buck'"

  # S3 bucket for lakehouse data
  s3_bucket: 'ammodepot-lakehouse'
  s3_iceberg_prefix: 's3://ammodepot-lakehouse/iceberg'

models:
  ammodepot_lakehouse:
    silver:
      +materialized: view
    gold:
      +materialized: view
      intermediate:
        +materialized: view
