  ammodepot_rfm_margin_m2: 0.20
  ammodepot_rfm_margin_m3: 0.24
  ammodepot_rfm_margin_m4: 0.26
  ammodepot_rfm_margin_m5: 0.30
  ammodepot_hunting_projectiles: "'SP','JSP','TSX','TTSX','Partition','AccuBond','Nosler','SST','InterLock'"
  ammodepot_hunting_calibers: "'.30-06','.308 Win','.270 Win','.243 Win','7mm Rem Mag','6.5 Creedmoor','30-06 Springfield','308/7.62','270 Win','243 Win','300 Win Mag','7mm-08'"
  ammodepot_hunting_fallback_calibers: "'30-06 Springfield','308/7.62','270 Win','243 Win','300 Win Mag','7mm Rem Mag','6.5 Creedmoor','7mm-08','25-06','280 Rem','35 Rem'"
