name: 'ammodepot'
version: '2.0'
config-version: 2

profile: 'ammodepot'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

dispatch:
  - macro_namespace: ammodepot
    search_order: [ammodepot, dbt_utils, dbt]

vars:
  # Timezone for all convert_timezone() calls
  ammodepot_timezone: 'America/New_York'

  # Default customer email fallback
  ammodepot_default_customer_email: 'customer@nonidentified.com'

  # Base URL for product links
  ammodepot_base_url: 'https://www.ammunitiondepot.com'

  # Free shipping threshold
  ammodepot_free_shipping_threshold: 140

  # Fishbowl location group for inventory views
  ammodepot_default_location_group_id: 8

  # Valid order statuses for segmentation
  ammodepot_valid_order_statuses: "'PROCESSING','COMPLETE','UNVERIFIED'"

  # Fishbowl relationship/type IDs
  ammodepot_kit_relationship_type_id: 30
  ammodepot_sale_item_type_id: 10
  ammodepot_kit_type_id: 10
  ammodepot_receipt_order_type_id: 10
  ammodepot_base_uom_id: 1

  # Magento default store ID (admin/global scope)
  ammodepot_default_store_id: 0

  # Magento discontinued attribute set
  ammodepot_discontinued_attribute_set_id: 50

  # Magento EAV attribute IDs
  ammodepot_magento_attr_id_manufacturer: 677
  ammodepot_magento_attr_id_projectile: 681
  ammodepot_magento_attr_id_unit_type: 649
  ammodepot_magento_attr_id_ddcaliber: 678
  ammodepot_magento_attr_id_dd_suggested_use: 682
  ammodepot_magento_attr_id_ddaction: 718
  ammodepot_magento_attr_id_ddcondition: 676
  ammodepot_magento_attr_id_ddgun_parts: 817
  ammodepot_magento_attr_id_rounds_package: 152
  ammodepot_magento_attr_id_capacity: 165
  ammodepot_magento_attr_id_vendor: 145
  ammodepot_magento_attr_id_material: 188
  ammodepot_magento_attr_id_primary_category: 878
  ammodepot_magento_attr_id_ddcolor: 685
  ammodepot_magento_attr_id_ddweapons_platform: 756

  # Receipt item status IDs (received/reconciled)
  ammodepot_receipt_status_received: 10
  ammodepot_receipt_status_reconciled: 40

  # Storefront identification (order prefix → channel name)
  ammodepot_gunbroker_order_prefix: 'GB'
  ammodepot_gunbroker_store_name: 'GunBroker'
  ammodepot_default_store_name: 'Website'

  # Lead time ranking limit
  ammodepot_lead_time_rank_limit: 3

  # Product description exclusions for cost calculations
  ammodepot_cost_exclude_product_pattern: '%POLLYAMOBAG%'

  # RFM segmentation thresholds (d_customer_segmentation)
  # Frequency: number of purchases in trailing 12 months
  ammodepot_rfm_freq_f2: 2
  ammodepot_rfm_freq_f3: 3
  ammodepot_rfm_freq_f4: 5
  # Recency: days since last purchase (label thresholds)
  ammodepot_rfm_recency_r5: 30
  ammodepot_rfm_recency_r4: 60
  ammodepot_rfm_recency_r3: 180
  ammodepot_rfm_recency_r2: 240
  ammodepot_rfm_recency_r1: 365
  # Recency: days since last purchase (score thresholds — different from label)
  ammodepot_rfm_recency_int_3: 120
  ammodepot_rfm_recency_int_2: 180
  # Value: total revenue in trailing 12 months
  ammodepot_rfm_value_v2: 149
  ammodepot_rfm_value_v3: 225
  ammodepot_rfm_value_v4: 300
  ammodepot_rfm_value_v5: 500
  # Margin: gross margin ratio
  ammodepot_rfm_margin_m2: 0.20
  ammodepot_rfm_margin_m3: 0.24
  ammodepot_rfm_margin_m4: 0.26
  ammodepot_rfm_margin_m5: 0.30

  # Product use-type classification lists (d_product)
  ammodepot_hunting_projectiles: "'SP','JSP','TSX','TTSX','Partition','AccuBond','Nosler','SST','InterLock'"
  ammodepot_hunting_calibers: "'.30-06','.308 Win','.270 Win','.243 Win','7mm Rem Mag','6.5 Creedmoor','30-06 Springfield','308/7.62','270 Win','243 Win','300 Win Mag','7mm-08'"
  ammodepot_hunting_fallback_calibers: "'30-06 Springfield','308/7.62','270 Win','243 Win','300 Win Mag','7mm Rem Mag','6.5 Creedmoor','7mm-08','25-06','280 Rem','35 Rem'"
  ammodepot_non_hunting_projectiles: "'FMJ','TMJ','RN','Frangible'"
  ammodepot_defense_projectiles: "'JHP','XTP','Gold Dot','HST','Critical Defense','Critical Duty'"
  ammodepot_defense_calibers: "'9mm','.45 ACP','.380 Auto','.38 Special','.40 S&W','.357 Mag','45 ACP','380 ACP','38 Special','40 S&W','357 Mag','10mm','44 Mag'"
  ammodepot_defense_fallback_calibers: "'9mm','45 ACP','380 ACP','38 Special','40 S&W','357 Mag','10mm','44 Mag','45 LC'"
  ammodepot_tactical_calibers: "'5.56 NATO','223/5.56','300 Blackout'"
  ammodepot_tactical_projectiles: "'HP','OTM','BTHP'"
  ammodepot_tactical_fallback_calibers: "'223/5.56','300 Blackout','308 Win Match','338 Lapua'"
  ammodepot_sporting_projectiles: "'FMJ','TMJ','FMJBT','LRN','LFN'"
  ammodepot_sporting_shot_types: "'7.5 Shot','8 Shot','9 Shot','Clay & Target','Game & Target'"
  ammodepot_sporting_fallback_calibers: "'22 LR','22 Mag/WMR','17 HMR','22-250','6mm Creedmoor'"
  ammodepot_shotgun_gauges: "'12 Gauge','20 Gauge','410 Bore','28 Gauge'"
  ammodepot_shotgun_sporting_shot: "'7.5 Shot','8 Shot','9 Shot','7 Shot','6 Shot','5 Shot','4 Shot'"
  ammodepot_shotgun_defense_slug: "'00 Buck','Slug','OO Buck','000 Buck','4 Buck','Buckshot','1 Buck','2 Buck','3 Buck'"

tests:
  ammodepot:
    # Default warn severity: Airbyte CDC source data naturally has duplicate
    # and null IDs for updated/deleted rows. Tests alert but do not block builds.
    +severity: warn

models:
  ammodepot:
    silver:
      +schema: silver
      +materialized: view
      # High-fan-out Silver views materialized as tables to avoid
      # repeated QUALIFY ROW_NUMBER scans across Gold models
      fishbowl:
        fishbowl_soitem:
          +materialized: table
        fishbowl_product:
          +materialized: table
        fishbowl_uomconversion:
          +materialized: table
        fishbowl_part:
          +materialized: table
      magento:
        magento_sales_order_item:
          +materialized: table
        magento_sales_order:
          +materialized: table
      inventory:
        inventory_qtyinventorytotals:
          +materialized: table
    gold:
      +schema: gold
      +materialized: table
      +transient: true
      +query_tag: 'dbt:gold'
      intermediate:
        +schema: gold
        +materialized: view
        +query_tag: 'dbt:gold:intermediate'
        # Critical bottlenecks materialized as tables
        int_fishbowl_order_cost:
          +materialized: table
        int_magento_product_eav_lookups:
          +materialized: table
        int_sales_cost_fallback:
          +materialized: table
      f_sales:
        +materialized: incremental
        +incremental_strategy: merge
        +unique_key: 'ID'
