sources:
  - name: magento
    description: >
      Magento data from S3 Iceberg Landing via Snowflake External Volume.
      Append-only CDC — deduplication handled in Silver layer.
    database: AD_ANALYTICS
    schema: LAKEHOUSE_LANDING
    tables:
      - name: customer_entity
        identifier: MAGENTO_CUSTOMER_ENTITY
      - name: catalog_category_product
        identifier: MAGENTO_CATALOG_CATEGORY_PRODUCT
      - name: catalog_category_entity_varchar
        identifier: MAGENTO_CATALOG_CATEGORY_ENTITY_VARCHAR
      - name: catalog_product_super_link
        identifier: MAGENTO_CATALOG_PRODUCT_SUPER_LINK
      - name: store
        identifier: MAGENTO_STORE
      - name: sales_order
        identifier: MAGENTO_SALES_ORDER
      - name: sales_order_item
        identifier: MAGENTO_SALES_ORDER_ITEM
      - name: sales_order_address
        identifier: MAGENTO_SALES_ORDER_ADDRESS
      - name: catalog_product_entity
        identifier: MAGENTO_CATALOG_PRODUCT_ENTITY
      - name: sales_shipment_grid
        identifier: MAGENTO_SALES_SHIPMENT_GRID
      - name: quote_shipping_rate
        identifier: MAGENTO_QUOTE_SHIPPING_RATE
      - name: quote_address
        identifier: MAGENTO_QUOTE_ADDRESS
      - name: quote
        identifier: MAGENTO_QUOTE
      - name: quote_address_item
        identifier: MAGENTO_QUOTE_ADDRESS_ITEM
      - name: catalog_product_entity_varchar
        identifier: MAGENTO_CATALOG_PRODUCT_ENTITY_VARCHAR
      - name: catalog_product_entity_decimal
        identifier: MAGENTO_CATALOG_PRODUCT_ENTITY_DECIMAL
      - name: catalog_product_entity_int
        identifier: MAGENTO_CATALOG_PRODUCT_ENTITY_INT
      - name: catalog_product_entity_text
        identifier: MAGENTO_CATALOG_PRODUCT_ENTITY_TEXT
      - name: eav_attribute_option_value
        identifier: MAGENTO_EAV_ATTRIBUTE_OPTION_VALUE
      - name: eav_attribute_set
        identifier: MAGENTO_EAV_ATTRIBUTE_SET
      - name: eav_attribute
        identifier: MAGENTO_EAV_ATTRIBUTE
