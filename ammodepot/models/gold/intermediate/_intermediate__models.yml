
models:
  - name: int_fishbowl_magento_order_map
    description: >
      Maps Fishbowl sales orders to Magento orders using the order number.
      Fishbowl SO.NUM base (before the dash suffix) matches Magento INCREMENT_ID.
      Replaces the plugininfo-based mapping which stopped receiving new SO records
      after 2026-01-05.
    columns:
      - name: fishbowl_so_id
        description: "Fishbowl sales order identifier."
        tests:
          - not_null
      - name: magento_order_id
        description: "Magento order identifier (entity_id)."
        tests:
          - not_null

  - name: int_fishbowl_order_cost
    description: >
      Fishbowl-to-Magento cost resolution per order item. Contains all cost-related CTEs
      from the original f_sales model including ID mapping, kit cost aggregation, product
      average cost, and deduplication of costs when multiple Fishbowl records map to one
      Magento order item.
    columns:
      - name: order_item_id
        description: "Magento order item identifier (join key for f_sales)."
        tests:
          - not_null

  - name: int_magento_order_freight
    description: >
      Freight cost allocation per Magento order. Combines UPS invoice data, Fishbowl
      shipment costs, and Magento shipping amounts into net sales and freight figures
      needed for weight-based freight allocation in f_sales.
    columns:
      - name: order_id
        description: "Magento order identifier (join key for f_sales)."
        tests:
          - not_null

  - name: int_magento_product_conversion
    description: >
      UOM conversion factors and piece-level quantity per order item. Calculates
      part_qty_sold by multiplying order quantity by UOM conversion factor from
      Fishbowl product/part data.
    columns:
      - name: item_id
        description: "Magento order item identifier (join key for f_sales)."
        tests:
          - not_null

  - name: int_magento_product_attributes
    description: >
      Pivoted Magento EAV varchar, text, and decimal product attributes. Resolves
      attribute codes to values and presents one row per product entity with named
      columns for each attribute (product_name, url_key, cost, price, etc.).
    columns:
      - name: entity_id
        description: "Magento product entity identifier."
        tests:
          - unique
          - not_null

  - name: int_magento_product_eav_lookups
    description: >
      Resolved EAV integer attribute option values for products. Looks up 15 separate
      int attributes (manufacturer, projectile, caliber, etc.) and resolves their
      option_id values to human-readable labels.
    columns:
      - name: entity_id
        description: "Magento product entity identifier."
        tests:
          - unique
          - not_null

  - name: int_magento_product_taxonomy
    description: >
      Product category hierarchy and parent SKU mapping. Aggregates category names
      via LISTAGG and resolves configurable product parent SKUs via catalog_product_super_link.
    columns:
      - name: entity_id
        description: "Magento product entity identifier."
        tests:
          - unique:
              config:
                severity: warn
          - not_null

  - name: int_customer_cohort
    description: >
      Customer cohort assignment. Maps each customer (by rank_id) to their first
      purchase month. Shared base for f_cohort and f_cohort_detailed.
    columns:
      - name: rank_id
        description: "Customer rank identifier from magento_d_customerupdated."
        tests:
          - unique
          - not_null
      - name: cohort_month
        description: "Month of the customer's first purchase."
        tests:
          - not_null

  - name: int_fishbowl_gunbroker_sales
    description: >
      GunBroker sales from Fishbowl-only orders (GB-prefixed SO numbers).
      Shapes Fishbowl soitem line items to match the f_sales 36-column schema
      so they can be UNION ALL'd into the fact table. Uses negative IDs to
      avoid collision with positive Magento IDs. Maps Fishbowl product_id to
      Magento product_entity_id via plugininfo for d_product compatibility.
    columns:
      - name: ID
        description: "Negative of Fishbowl so_item_id (avoids Magento ID collision)."
        tests:
          - unique
          - not_null
      - name: INCREMENT_ID
        description: "Fishbowl SO number with GB prefix (e.g. GB123456)."
        tests:
          - not_null
      - name: STOREFRONT
        description: "Always 'GunBroker' for this intermediate."
        tests:
          - accepted_values:
              arguments:
                values: ['GunBroker']

  - name: int_fishbowl_product_enrichment
    description: >
      Fishbowl-sourced product enrichment data including vendor assignment, discontinued
      status, attribute set name, UOM conversion factor, average cost, and last vendor cost.
    columns:
      - name: entity_id
        description: "Magento product entity identifier."
        tests:
          - unique
          - not_null
