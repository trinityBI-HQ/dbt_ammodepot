models:
  - name: f_sales_realtime
    config:
      materialized: view
    description: >
      Real-time sales view for today's orders. Filters to the last 4 days of
      sales data and shows only today's transactions with order count metrics.
      Materialized as a view for real-time freshness.
    columns:
      - name: CREATED_AT
        description: "Order creation timestamp converted to local timezone"
      - name: TIMEDATE
        description: "Order creation timestamp (same as CREATED_AT)"
      - name: TRICKAT
        description: "Original UTC timestamp from source"
      - name: PRODUCT_ID
        description: "Magento product entity ID"
      - name: ORDER_ID
        description: "Magento order entity ID"
      - name: ROW_TOTAL
        description: "Net line total (row_total - refunded - discount + discount_refunded)"
      - name: BASE_COST
        description: "Base cost from Magento"
      - name: TESTSKU
        description: "Product SKU"
      - name: PRODUCT_TYPE
        description: "Magento product type (simple, bundle, etc.)"
      - name: DISTINCT_ORDER_ID_COUNT
        description: "Total distinct orders for today (cross-joined metric)"
      - name: DISTINCT_ORDER_ID_BY_TESTSKU
        description: "Distinct orders per SKU for today"
